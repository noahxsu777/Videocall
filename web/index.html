<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hype Call</title>
    <!-- PWA -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#0d0718" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hype Call" />
    <script type="text/javascript">
      // ref: https://cn.vitejs.dev/config/build-options.html#build-target
      function isSupportsES6Modules() {
        const script = document.createElement('script');
        if ('noModule' in script) {
          return true;
        }
        script.type = 'module';
        return script.type === 'module';
      }
      function isSupportDynamicImport() {
         try {
          new Function('import("")');
          return true;
        } catch (error) {
          return false;
        }
      }
      if (!isSupportsES6Modules() || !isSupportDynamicImport()) {
        console.error(`isSupportsES6Modules: ${isSupportsES6Modules()}, isSupportDynamicImport: ${isSupportDynamicImport()}.`)
        alert("The current browser failed to load the page, we recommend you use the latest version of chrome browser.");
      }
    </script>
  </head>
  <body>
    <div id="app">
      <!-- Instant loading screen shown while the app bundle boots (and on
           every reload, e.g. pull-to-refresh) so the user never sees a
           blank black flash. Vue replaces all of #app's content once it
           mounts, so this disappears automatically. -->
      <div id="app-boot" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:radial-gradient(120% 90% at 50% -10%,#3a1d4d 0%,#1c1030 45%,#0d0718 100%);">
        <div style="display:flex;flex-direction:column;align-items:center;gap:14px;animation:app-boot-rise 0.6s ease both;">
          <img src="./icons/icon-192.png" alt="Hype Call" width="88" height="88" style="width:88px;height:88px;border-radius:22px;box-shadow:0 12px 40px rgba(255,46,116,0.35);" />
          <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:22px;font-weight:800;letter-spacing:0.5px;background:linear-gradient(135deg,#c79bff,#ff6ba0);-webkit-background-clip:text;background-clip:text;color:transparent;">Hype Call</div>
        </div>
        <div style="width:38px;height:38px;border-radius:50%;border:3px solid rgba(255,255,255,0.15);border-top-color:#ff2e74;animation:app-boot-spin 0.8s linear infinite;"></div>
      </div>
      <style>
        @keyframes app-boot-spin{to{transform:rotate(360deg)}}
        @keyframes app-boot-rise{from{opacity:0;transform:translateY(10px) scale(0.96)}to{opacity:1;transform:none}}
      </style>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
